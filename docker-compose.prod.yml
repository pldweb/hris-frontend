# ============================================
# HRIS Frontend - Production Docker Compose
# ============================================
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
# ============================================

services:
  hris-fe:
    image: ${DOCKER_IMAGE:-ghcr.io/your-org/hris-fe}:${DOCKER_TAG:-latest}
    build:
      context: .
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://api.yourdomain.com/api/v1}
    ports:
      - "${FE_PORT:-80}:80"
    restart: unless-stopped
    networks:
      - hris-prod

networks:
  hris-prod:
    driver: bridge
